backend = "glx";
vsync = true;

corner-radius = 12;
round-borders = 12;

blur-method = "dual_kawase";
blur-strength = 8;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.25;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;

inactive-opacity-override = false;

opacity-rule = [
  "95:class_g = 'kitty'",
  "100:class_g = 'Rofi'"
];

focus-exclude = [
  "class_g = 'Cairo-clock'"
];

detect-rounded-corners = true;
detect-client-opacity = true;

unredir-if-possible = false;

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
